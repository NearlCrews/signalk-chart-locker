<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Locker panel fixture</title>
    <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e9eef4;
      color: #18202c;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    main {
      width: min(100%, 75.75rem);
      margin-inline: auto;
    }

    .fixture-title {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    </style>
  </head>
  <body>
    <main>
      <h1 class="fixture-title">Chart Locker configuration</h1>
      <div id="root"></div>
    </main>
    <div id="fixture-error" role="alert"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
