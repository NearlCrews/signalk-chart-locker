[package]
name = "binnacle-tilecache"
version = "0.1.0"
edition = "2021"

[lib]
name = "binnacle_tilecache"
path = "src/lib.rs"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
