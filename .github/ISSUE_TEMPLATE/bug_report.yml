name: Bug report
description: Report a defect in the plugin
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so the issue can be reproduced and triaged.
        For usage questions, please use [Discussions](https://github.com/NearlCrews/signalk-chart-locker/discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
      placeholder: A saved region stays stuck downloading and never reaches 100 percent.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps that consistently trigger the bug.
      placeholder: |
        1. Enable the plugin with default settings
        2. Draw a region in the Binnacle chartplotter and start the download
        3. Observe the region status
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Shared tile cache
        - Saved regions and region download
        - Auto-cache around the boat
        - PMTiles chart provider
        - Configuration panel and cache operations
        - Disk usage, readiness, or diagnostics
        - Container lifecycle
        - Other
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 0.4.2
    validations:
      required: true

  - type: input
    id: container-version
    attributes:
      label: signalk-container version
      placeholder: 1.20.2
    validations:
      required: true

  - type: input
    id: signalk-version
    attributes:
      label: Signal K server version
      placeholder: 2.27.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 20.18.0
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Container runtime
      description: Podman or Docker, with version.
      placeholder: Podman 4.9.3
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Debian 12 on Raspberry Pi 5
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Signal K AppStore
        - npm
        - Manual
        - Other
    validations:
      required: true

  - type: textarea
    id: chart-sources
    attributes:
      label: Affected chart sources or PMTiles charts
      description: Optional. If the bug is tied to a specific raster overlay source, the vector basemap, or a specific `.pmtiles` archive, list them.
      placeholder: NOAA raster overlay; vector basemap; my-harbor.pmtiles

  - type: textarea
    id: config
    attributes:
      label: Plugin configuration
      description: Paste the relevant plugin configuration (redact secrets).
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Signal K server or container log output. Include structured event names and the panel diagnostics counts when available. Redact credentials and private host paths.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, possible causes, or anything else helpful.
