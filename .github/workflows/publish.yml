name: Publish plugin to npm

# The matching, tested container image must already exist. This workflow verifies its architectures,
# source labels, healthcheck, keyless signature, provenance, and SBOM attestations before npm can run.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      attestations: read
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Derive and validate release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/release-metadata.mjs

      - name: Record the release commit
        id: source
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr for verification
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify the versioned image
        id: image
        env:
          EXPECTED_REVISION: ${{ steps.source.outputs.revision }}
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
          IMAGE: ${{ steps.release.outputs.image }}
          IMAGE_TAG: ${{ steps.release.outputs.tag }}
        run: node scripts/verify-container-image.mjs

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Verify the keyless image signature
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/container-image.yml@refs/tags/${RELEASE_TAG}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}@${IMAGE_DIGEST}"

      - name: Verify image provenance and SBOM attestations
        env:
          AMD64_DIGEST: ${{ steps.image.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.image.outputs.arm64_digest }}
          EXPECTED_REVISION: ${{ steps.source.outputs.revision }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.release.outputs.image }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          for reference in \
            "${IMAGE}@${IMAGE_DIGEST}|https://slsa.dev/provenance/v1" \
            "${IMAGE}@${AMD64_DIGEST}|https://spdx.dev/Document/v2.3" \
            "${IMAGE}@${ARM64_DIGEST}|https://spdx.dev/Document/v2.3"; do
            image_reference="${reference%%|*}"
            predicate_type="${reference#*|}"
            gh attestation verify "oci://${image_reference}" \
              --repo "$GITHUB_REPOSITORY" \
              --bundle-from-oci \
              --predicate-type "$predicate_type" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/container-image.yml" \
              --source-digest "$EXPECTED_REVISION" \
              --source-ref "refs/tags/${RELEASE_TAG}"
          done

  build-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.95.0

      - name: Derive and validate release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/release-metadata.mjs

      - name: Require the release commit to belong to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main

      - name: Pin the trusted-publishing npm client
        run: npm install --global npm@12.0.1

      - run: npm ci
      - run: npx --no-install playwright install --with-deps chromium firefox webkit
      - name: Run every direct-publish guard
        run: npm run prepublishOnly
      - name: Create and verify the release tarball
        run: |
          npm run pack:release
          npm run verify:release-tarball

      - name: Upload the exact tested tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-${{ steps.release.outputs.version }}
          path: |
            package/*.tgz
            package/*.sha256
          if-no-files-found: error
          retention-days: 14

  verify-signalk-admin:
    needs: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - signalk_server: '2.24.0'
            signalk_container: '1.20.0'
          - signalk_server: 'latest'
            signalk_container: 'latest'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Derive and validate release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/release-metadata.mjs

      - run: npm ci

      - name: Download the exact tested tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-${{ steps.release.outputs.version }}
          path: package

      - run: npm run verify:release-tarball

      - name: Install in Signal K ${{ matrix.signalk_server }} with signalk-container ${{ matrix.signalk_container }}
        env:
          SIGNALK_CONTAINER_VERSION: ${{ matrix.signalk_container }}
          SIGNALK_SERVER_VERSION: ${{ matrix.signalk_server }}
        run: |
          mkdir -p /tmp/sk-test
          cd /tmp/sk-test
          npm init --yes
          npm install "signalk-server@${SIGNALK_SERVER_VERSION}" "signalk-container@${SIGNALK_CONTAINER_VERSION}"
          npm install "$GITHUB_WORKSPACE"/package/*.tgz --ignore-scripts
          # npm may hoist the Admin package even though signalk-server serves it from its
          # dependency-local path. Link the same installed package back to that expected location.
          node "$GITHUB_WORKSPACE/scripts/link-signalk-admin.mjs" /tmp/sk-test
          mkdir -p plugin-config-data
          echo '{"enabled":true,"configuration":{}}' > plugin-config-data/signalk-chart-locker.json

      - name: Execute the Admin host and mount the production panel
        env:
          PORT: 3000
          SIGNALK_BROWSER_CHANNEL: chrome
          SIGNALK_URL: http://127.0.0.1:3000
          SIGNALK_NODE_CONFIG_DIR: /tmp/sk-test
        run: |
          set -euo pipefail
          cd /tmp/sk-test
          npx --no-install signalk-server > /tmp/signalk.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT
          ready=false
          for attempt in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:3000/signalk/v1/api/ > /dev/null; then
              ready=true
              break
            fi
            sleep 2
          done
          if [ "$ready" != true ]; then
            cat /tmp/signalk.log
            exit 1
          fi
          cd "$GITHUB_WORKSPACE"
          if ! npm run test:integration; then
            cat /tmp/signalk.log
            exit 1
          fi

  publish-npm:
    needs: [verify-image, build-package, verify-signalk-admin]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Derive and validate release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/release-metadata.mjs

      - name: Pin the trusted-publishing npm client
        run: npm install --global npm@12.0.1

      - name: Download the exact tested tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-${{ steps.release.outputs.version }}
          path: package

      - run: npm run verify:release-tarball

      # npm trusted publishing exchanges the job's GitHub OIDC identity for a short-lived publish
      # credential. No long-lived npm token is available to this workflow.
      - name: Publish the tested tarball with trusted publishing
        env:
          NPM_TAG: ${{ steps.release.outputs.npm_tag }}
        run: npm publish ./package/*.tgz --ignore-scripts --access public --tag "$NPM_TAG"
