name: SignalK Plugin CI

# Calls the official SignalK reusable plugin-ci workflow. The community plugin
# registry (dirkwa.github.io/signalk-plugin-registry) credits a plugin only when
# a workflow run referencing SignalK/signalk-server/.github/workflows/plugin-ci.yml
# exists on the published version's commit; without one it applies a scoring
# penalty. The tag trigger guarantees a run exists on the exact commit each
# release is published from. The reusable workflow runs npm ci, the build, the tests, and npm pack
# across its supported platform and Node.js matrix. Its reviewed upstream revision is pinned here and
# advanced through the dependency-update procedure. The Rust container has its own job in ci.yml.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin-ci:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@fc9394a1d80577b118857e9ef6761651bf0d9082 # master 2026-07-16
    with:
      build-command: npm run build
